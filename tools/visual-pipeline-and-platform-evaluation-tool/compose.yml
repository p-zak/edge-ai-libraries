# Always defines the service 'vippet' with the same name, independent of hardware profile.
# Device setup is handled in override files.
x-vippet: &vippet
  image: docker.io/intel/vippet-app:${DOCKER_TAG}
  build:
    context: .
    target: ${TARGET:-prod}
    dockerfile: vippet/Dockerfile
    args:
      http_proxy:
      https_proxy:
      no_proxy:
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--output", "/dev/null", "http://localhost:7860/api/v1/health"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 5s
    start_interval: 1s
  restart: on-failure:5
  depends_on:
    mediamtx:
      condition: service_started
  environment:
    GST_DEBUG: "1"
    APP_LOG_LEVEL: INFO
    RUNNER_LOG_LEVEL: INFO
    WEB_SERVER_LOG_LEVEL: WARNING
    METRICS_LOG_LEVEL: INFO
    MODELS_PATH: /models/output
    SUPPORTED_MODELS_FILE: /models/supported_models.yaml
    INPUT_VIDEO_DIR: /videos/input
    OUTPUT_VIDEO_DIR: /videos/output
    METADATA_DIR: /metadata
    SIMPLE_VIEW_VISIBLE_ELEMENTS: "*src,urisourcebin,gva*,*sink,source"
    SIMPLE_VIEW_INVISIBLE_ELEMENTS: "gvafpscounter,gvametapublish,gvametaconvert,gvawatermark"
    LIVE_STREAM_SERVER_HOST: ${LIVE_STREAM_SERVER_HOST:-mediamtx}
    LIVE_STREAM_SERVER_PORT: ${LIVE_STREAM_SERVER_PORT:-8554}
    RTSPSRC_DEFAULT_LATENCY_MS: ${RTSPSRC_DEFAULT_LATENCY_MS:-100}
    METRICS_SERVICE_URL: ${METRICS_SERVICE_URL:-http://metrics-service:9090}
    http_proxy: ${http_proxy}
    https_proxy: ${https_proxy}
    no_proxy: "${no_proxy:+${no_proxy},}mediamtx,metrics-service"
  device_cgroup_rules:
    # Broad access to USB devices is required to support a wide range of USB cameras.
    - 'c 189:* rmw'
    - 'a 189:* rwm'
  volumes:
    - "/dev:/dev"
    - ./shared/models/:/models
    - ./shared/videos/:/videos
    - ./shared/scripts/:/scripts
    - ./shared/onvif/:/onvif
    - ./shared/metadata/:/metadata

services:
  vippet-ui:
    image: docker.io/intel/vippet-ui:${DOCKER_TAG}
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: ui
    ports:
      - "80:80"
    restart: on-failure:5
    depends_on:
      vippet:
        condition: service_healthy
      metrics-service:
        condition: service_started
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: "${no_proxy:+${no_proxy},}mediamtx,metrics-service"
    volumes:
      - ./shared/videos/:/videos
      - ./vippet/api/static:/usr/share/nginx/html/static
  models:
    profiles: [do-not-start]
    image: docker.io/intel/vippet-models:${DOCKER_TAG}
    build:
      context: .
      dockerfile: models/Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    stdin_open: true
    tty: true
    container_name: models
    volumes:
      - ./shared/models/:/models
    environment:
      - MODELS_PATH=/models/output
      - SUPPORTED_MODELS_FILE=/models/supported_models.yaml
      - QUANTIZE_DATASET=coco128
      - MODEL_INSTALLATION=${MODEL_INSTALLATION:-once}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy}
    command: './model_manager.sh'
  model-download:
    image: docker.io/intel/model-download:2026.1.0-20260331-weekly
    container_name: model-download
    command: --plugins ${MODEL_DOWNLOAD_PLUGINS:-openvino,huggingface,ultralytics,geti}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--output", "/dev/null", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
      start_interval: 5s
    restart: on-failure:5
    environment:
      MODELS_DIR: /models/output
      CORS_ALLOW_ORIGINS: "*"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_TOKEN: ${HF_TOKEN:-}
      UV_CACHE_DIR: /cache/uv
      GETI_HOST: ${GETI_HOST:-}
      GETI_TOKEN: ${GETI_TOKEN:-}
      GETI_WORKSPACE_ID: ${GETI_WORKSPACE_ID:-}
      GETI_SERVER_API_VERSION: ${GETI_SERVER_API_VERSION:-v1}
      GETI_SERVER_SSL_VERIFY: ${GETI_SERVER_SSL_VERIFY:-False}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
    volumes:
      - ./shared/models/:/models
      - ./shared/model-download/venv:/opt/.venv
      - ./shared/model-download/cache:/cache
  vippet:  # Always 'vippet', hardware config from override files
    <<: *vippet
    container_name: vippet
    ports:
      - "7860:7860"
  metrics-service:
    image: docker.io/intel/metrics-service:2026.1.0-20260417-weekly
    container_name: metrics-service
    ports:
      - "9090:9090"
      - "9273:9273"
    privileged: true
    pid: host
    security_opt:
      - apparmor:unconfined
    devices:
      - "/dev/dri:/dev/dri"
    volumes:
      - /sys:/sys:ro
      - /run:/run:ro
      # TODO: Temporary, to have websocket output plugin available. Removed this mount and file from repo after metrics-service enables the plugin by default.
      - ./my-telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      METRICS_PORT: 9090
      LOG_LEVEL: INFO
      CORS_ORIGINS: "*"
      CUSTOM_METRICS_DIR: /app/custom-metrics
      METRICS_RETENTION_SECONDS: 300
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  mediamtx:
    image: bluenviron/mediamtx:1.15.6
    container_name: mediamtx
    environment:
      - MTX_LOGLEVEL=info
      - MTX_WEBRTCADDRESS=:8889
      - MTX_RTSPADDRESS=:8554
      - MTX_WEBRTCADDITIONALHOSTS=${HOST_IPS}
    ports:
      - "8554:8554"     # RTSP
      - "8889:8889"     # WebRTC signaling/HTTP
      - "8189:8189/udp" # WebRTC/ICE UDP 
  onvif-discovery:
    image: docker.io/intel/vippet-onvif-discovery:${DOCKER_TAG}
    build:
      context: ./onvif_discovery
      dockerfile: Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: onvif-discovery
    network_mode: host
    restart: on-failure:5
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      OUTPUT_FILE: /out/onvif_cameras.json
      DISCOVERY_INTERVAL: 20
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - ./shared/onvif:/out
  videogenerator:
    profiles: [do-not-start]
    image: docker.io/intel/vippet-videogenerator:${DOCKER_TAG}
    build:
      context: video_generator
      dockerfile: Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: videogenerator
    volumes:
      - "./shared/videos/video-generator:/usr/src/app/output"
      - "./video_generator/config.json:/usr/src/app/config.json"
      - "./video_generator/background.gif:/usr/src/app/background.gif"
      - "./video_generator/images:/usr/src/app/images"
    environment:
      LOG_LEVEL: INFO
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}

